# Alertmanager configuration
# Deployed as a Secret in the monitoring namespace.
# kube-prometheus-stack picks it up via alertmanagerSpec.alertmanagerConfigSelector.
#
# This config uses a simple routing tree:
# - Critical alerts page immediately
# - Warning alerts are grouped and sent hourly
# - Inhibit rules prevent alert storms when a node goes down
#
# To apply manually (if not using Helm values):
#   kubectl create secret generic alertmanager-monitoring-kube-prometheus-alertmanager \
#     --from-file=alertmanager.yaml=alertmanager/config.yaml \
#     -n monitoring --dry-run=client -o yaml | kubectl apply -f -
---
global:
  # Timeout for resolving an alert (i.e., alert stopped firing)
  resolve_timeout: 5m

route:
  group_by: ["alertname", "namespace", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: default
      group_wait: 2m
      repeat_interval: 4h

receivers:
  - name: default
    # Webhook to a self-hosted ntfy instance for push notifications
    # Replace with your actual ntfy server URL or swap for PagerDuty/Slack
    webhook_configs:
      - url: http://ntfy.homelab.local/k8s-alerts
        send_resolved: true
        http_config:
          bearer_token: "replace-with-your-ntfy-token"

  - name: critical
    webhook_configs:
      - url: http://ntfy.homelab.local/k8s-critical
        send_resolved: true
        http_config:
          bearer_token: "replace-with-your-ntfy-token"

inhibit_rules:
  # If a node is down, inhibit pod-level alerts from that node
  # to avoid an alert storm of CrashLooping/NotReady pods
  - source_match:
      alertname: NodeNotReady
      severity: critical
    target_match_re:
      alertname: (PodCrashLooping|DeploymentReplicasMismatch)
    equal: ["instance"]
