# kube-prometheus-stack Helm values
# Tuned for a 3-node homelab cluster with limited RAM.
# Default kube-prometheus-stack installs with generous resource requests
# that will OOM a homelab node. These values reduce memory footprint
# while keeping all components functional.
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f prometheus/values.yaml

grafana:
  enabled: true
  adminPassword: changeme-on-first-login
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: local-path
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  grafana.ini:
    server:
      root_url: http://192.168.1.110:3000
  service:
    type: NodePort
    nodePort: 30300

prometheus:
  prometheusSpec:
    # Retention tuned for homelab disk constraints
    retention: 15d
    retentionSize: "8GB"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    # Scrape interval — default 1m is fine for homelab, 15s is overkill
    scrapeInterval: 60s
    evaluationInterval: 60s
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Allow Prometheus to pick up ServiceMonitors from all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# node-exporter runs on every node via DaemonSet — expose node metrics
nodeExporter:
  enabled: true

# kube-state-metrics — object-level metrics (deployment replicas, pod phases, etc.)
kubeStateMetrics:
  enabled: true

# Disable components that don't apply to a single-cluster homelab
kubeControllerManager:
  enabled: true
  endpoints:
    - 192.168.1.110

kubeScheduler:
  enabled: true
  endpoints:
    - 192.168.1.110

kubeEtcd:
  enabled: true
  endpoints:
    - 192.168.1.110
  serviceMonitor:
    scheme: https
    caFile: /etc/prometheus/secrets/etcd-client-cert/ca.crt
    certFile: /etc/prometheus/secrets/etcd-client-cert/healthcheck-client.crt
    keyFile: /etc/prometheus/secrets/etcd-client-cert/healthcheck-client.key
