# Custom PrometheusRule alerts for homelab cluster
# These complement the default kube-prometheus-stack alert rules with
# homelab-specific thresholds and additional coverage.
#
# Apply: kubectl apply -f prometheus/alerts/custom-alerts.yaml -n monitoring
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-custom-alerts
  namespace: monitoring
  labels:
    # This label causes the kube-prometheus-stack Prometheus to pick it up
    release: monitoring
spec:
  groups:
    - name: node.rules
      interval: 60s
      rules:
        - alert: NodeMemoryPressureHigh
          expr: |
            (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} has less than 10% memory available"
            description: "Available memory is {{ $value | humanizePercentage }} on {{ $labels.instance }}. Homelab nodes have limited RAM — check for memory leaks."

        - alert: NodeDiskFull
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Root filesystem on {{ $labels.instance }} is almost full"
            description: "Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.instance }}."

        - alert: NodeCPUSustained
          expr: |
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ $labels.instance }}"
            description: "CPU usage above 85% for 15 minutes on {{ $labels.instance }}."

    - name: kubernetes.rules
      interval: 60s
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} has restarted {{ $value | printf \"%.0f\" }} times in the last 15 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has replica mismatch"
            description: "Desired {{ $value }} replicas not all available."

        - alert: PersistentVolumeFull
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is nearly full"
            description: "Volume usage at {{ $value | humanizePercentage }}."

        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node has been in NotReady state for more than 2 minutes."

    - name: etcd.rules
      interval: 60s
      rules:
        - alert: EtcdNoLeader
          expr: |
            etcd_server_has_leader == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "etcd has no leader"
            description: "etcd cluster has lost its leader. Cluster API operations will fail."

        - alert: EtcdHighCommitDuration
          expr: |
            histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket[5m])) > 0.25
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "etcd commit latency is high"
            description: "99th percentile commit duration is {{ $value }}s. Homelab disk I/O may be a bottleneck."
